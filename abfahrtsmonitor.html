<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abfahrtsmonitor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg-info:#E6F1FB;--bg-danger:#FCEBEB;--bg-success:#E1F5EE;
  --text:#1a1a1a;--text2:#6b6b6b;--text-info:#185FA5;--text-danger:#A32D2D;--text-success:#0F6E56;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.28);--border-info:rgba(24,95,165,0.4);
  --r:8px;--rl:12px
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg-info:#0C447C;--bg-danger:#501313;--bg-success:#085041;
  --text:#f0f0f0;--text2:#ababab;--text-info:#85B7EB;--text-danger:#F09595;--text-success:#5DCAA5;
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.28)
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;padding:1rem}
.app{max-width:600px;margin:0 auto}
.header{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.header h1{font-size:20px;font-weight:500}
.tabs{display:flex;gap:8px;margin-bottom:1.25rem}
.tab{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg);font-size:13px;color:var(--text2);cursor:pointer}
.tab.active{background:var(--bg-info);color:var(--text-info);border-color:var(--border-info)}
.stop-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem}
.stop-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:12px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.stop-card:hover{border-color:var(--border2)}
.stop-card.active{border:2px solid var(--border-info)}
.stop-name{font-size:15px;font-weight:500}
.stop-meta{font-size:12px;color:var(--text2);margin-top:2px}
.dep-list{display:flex;flex-direction:column;gap:6px}
.dep-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r)}
.dep-line{font-size:12px;font-weight:500;min-width:44px;padding:3px 7px;border-radius:6px;text-align:center;white-space:nowrap}
.dep-dir{flex:1;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dep-time{font-size:15px;font-weight:500;min-width:50px;text-align:right}
.dep-delay{font-size:12px;min-width:28px;text-align:right}
.ok{color:var(--text-success)}.late{color:var(--text-danger)}
.search-row{display:flex;gap:8px;margin-bottom:1rem}
.search-row input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--bg);color:var(--text)}
.search-row input:focus{outline:none;border-color:var(--border-info)}
.search-row button{padding:9px 14px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:14px;cursor:pointer}
.search-row button:hover{background:var(--bg2)}
.empty{padding:2rem;text-align:center;color:var(--text2);font-size:14px;border:1px dashed var(--border);border-radius:var(--rl)}
.save-btn{background:transparent;border:1px solid var(--border);border-radius:var(--r);padding:5px 10px;font-size:12px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px}
.save-btn.saved{color:var(--text-success);border-color:var(--text-success)}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-title{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:5px}
.refresh-btn{background:transparent;border:1px solid var(--border);border-radius:var(--r);color:var(--text2);cursor:pointer;font-size:13px;padding:5px 10px;display:flex;align-items:center;gap:4px}
.refresh-btn:hover{background:var(--bg2)}
.msg{padding:1.5rem;text-align:center;color:var(--text2);font-size:14px}
.err{padding:.75rem 1rem;background:var(--bg-danger);border-radius:var(--r);color:var(--text-danger);font-size:14px;margin-bottom:.75rem}
.attr{font-size:11px;color:var(--text2);margin-top:1.5rem;text-align:center}
.attr a{color:var(--text2)}
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <i class="ti ti-train" style="font-size:24px" aria-hidden="true"></i>
    <h1>Abfahrtsmonitor</h1>
    <span style="font-size:11px;color:var(--text2);margin-left:auto">Transitous 🌍</span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('nearby')" id="tab-nearby"><i class="ti ti-map-pin"></i> In der Nähe</button>
    <button class="tab" onclick="switchTab('saved')" id="tab-saved"><i class="ti ti-bookmark"></i> Gespeichert</button>
    <button class="tab" onclick="switchTab('search')" id="tab-search"><i class="ti ti-search"></i> Suche</button>
  </div>
  <div id="panel-nearby">
    <div id="nearby-content"></div>
  </div>
  <div id="panel-saved" style="display:none">
    <div id="saved-stops" class="stop-list"></div>
    <div id="saved-deps"></div>
  </div>
  <div id="panel-search" style="display:none">
    <div class="search-row">
      <input type="text" id="search-input" placeholder="Haltestelle weltweit suchen..." onkeydown="if(event.key==='Enter')doSearch()"/>
      <button onclick="doSearch()"><i class="ti ti-search"></i> Suchen</button>
    </div>
    <div id="search-results" class="stop-list"></div>
    <div id="search-deps"></div>
  </div>
  <div class="attr">Daten: <a href="https://transitous.org/sources/" target="_blank">Transitous</a> · OpenStreetMap</div>
</div>
<script>
const API = 'https://api.transitous.org/api';
let saved = JSON.parse(localStorage.getItem('abfahrt_v4') || '[]');
let tab = 'nearby';
let activeNearby = null, activeSaved = null, activeSearch = null;
let nearbyStops = [], searchResults = [];
let nearbyLat = null, nearbyLon = null;

function saveLS(){ localStorage.setItem('abfahrt_v4', JSON.stringify(saved)); }
function isSaved(id){ return saved.some(s=>s.id===id); }

async function apiFetch(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── Abfahrten laden ──────────────────────────────────────────────
// Für Koordinaten: stopId = "lat,lon" → stoptimes mit radius
// Für Stop-ID:     stopId = eigentliche ID
async function loadDeps(stopId, listId, isCoord){
  const el = document.getElementById(listId);
  if(!el) return;
  el.innerHTML = '<div class="msg"><span class="spin">↻</span> Lade Abfahrten…</div>';
  try {
    let url;
    if(isCoord){
      // Koordinaten: lade Abfahrten im Umkreis
      const [lat,lon] = stopId.split(',');
      url = `${API}/v5/stoptimes?stopId=${encodeURIComponent(`${lat},${lon}`)}&n=20&radius=300&time=${encodeURIComponent(new Date().toISOString())}`;
    } else {
      url = `${API}/v5/stoptimes?stopId=${encodeURIComponent(stopId)}&n=20&time=${encodeURIComponent(new Date().toISOString())}`;
    }
    const data = await apiFetch(url);
    renderDeps(data, el);
  } catch(e){
    el.innerHTML = `<div class="err"><i class="ti ti-alert-circle"></i> Fehler: ${e.message}</div>`;
  }
}

function renderDeps(data, el){
  const rows = data?.stopTimes || data?.departures || [];
  if(!rows.length){ el.innerHTML='<div class="msg">Keine Abfahrten gefunden.</div>'; return; }
  el.innerHTML = '<div class="dep-list">' + rows.slice(0,14).map(d=>{
    // MOTIS v5 stoptimes response format
    const dep = d.departure || d.arrival || {};
    const scheduledTime = dep.scheduledTime || dep.plannedTime;
    const realtimeTime  = dep.time || dep.realtime;
    const when     = realtimeTime  ? new Date(realtimeTime)  : (scheduledTime ? new Date(scheduledTime) : null);
    const sched    = scheduledTime ? new Date(scheduledTime) : when;
    const mins     = when ? Math.round((when - Date.now())/60000) : null;
    const delayMin = (when && sched) ? Math.round((when - sched)/60000) : 0;
    const timeStr  = mins===null?'–':mins<=0?'jetzt':`${mins} min`;
    const delayStr = delayMin>0?`+${delayMin}`:delayMin<0?`${delayMin}`:'';
    const delayCls = delayMin>2?'late':'ok';
    // Linienname: shortName > routeShortName > headsign-prefix
    const line = d.route?.shortName || d.routeShortName || d.line?.name || (d.headsign||'').split(' ')[0] || '?';
    const dir  = d.headsign || d.direction || d.trip?.headsign || '–';
    const stop = d.stop?.name ? ` · ${d.stop.name}` : '';
    // Farbe
    const rc = d.route?.color || d.routeColor;
    const tc = d.route?.textColor || d.routeTextColor;
    const style = rc ? `background:#${rc};color:#${tc||'fff'}` : 'background:#E6F1FB;color:#0C447C';
    return `<div class="dep-row">
      <span class="dep-line" style="${style}">${line}</span>
      <span class="dep-dir">${dir}${stop}</span>
      <span class="dep-delay ${delayCls}">${delayStr}</span>
      <span class="dep-time">${timeStr}</span>
    </div>`;
  }).join('') + '</div>';
}

// ── Stop-Karte ───────────────────────────────────────────────────
function stopCard(stop, activeId, clickFn, btnFn){
  const active = stop.id===activeId ? 'active' : '';
  const meta   = [stop.district, stop.city].filter(Boolean).join(', ');
  const sj     = encodeURIComponent(JSON.stringify({id:stop.id, name:stop.name, city:stop.city||''}));
  return `<div class="stop-card ${active}" onclick="${clickFn}('${stop.id.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}','${stop.name.replace(/'/g,"\\'")}')">
    <div>
      <div class="stop-name">${stop.name}</div>
      ${meta?`<div class="stop-meta">${meta}</div>`:''}
    </div>
    ${btnFn?btnFn(stop,sj):''}
  </div>`;
}

function saveBtn(stop, sj){
  const s = isSaved(stop.id);
  return `<button class="save-btn ${s?'saved':''}" onclick="event.stopPropagation();toggleSave(decodeURIComponent('${sj}'))">
    <i class="ti ti-${s?'bookmark-filled':'bookmark'}"></i>
  </button>`;
}
function delBtn(stop, sj){
  return `<button class="save-btn saved" onclick="event.stopPropagation();toggleSave(decodeURIComponent('${sj}'))">
    <i class="ti ti-trash"></i>
  </button>`;
}
function toggleSave(json){
  const s = JSON.parse(json);
  if(isSaved(s.id)) saved = saved.filter(x=>x.id!==s.id);
  else saved.push(s);
  saveLS();
  if(tab==='nearby') renderNearbyStops();
  if(tab==='saved')  renderSaved();
  if(tab==='search') renderSearchList();
}

// ── Nearby ───────────────────────────────────────────────────────
function depsBlock(id, name, clickFn, isCoord){
  return `<div class="section-head">
    <span class="sec-title"><i class="ti ti-clock"></i>${name}</span>
    <button class="refresh-btn" onclick="${clickFn}('${id.replace(/'/g,"\\'")}','${name.replace(/'/g,"\\'")}')"><i class="ti ti-refresh"></i> Aktualisieren</button>
  </div><div id="dep-list-${clickFn}"></div>`;
}

function renderNearbyStops(){
  if(!nearbyStops.length) return;
  const stopsHtml = nearbyStops.map(s=>stopCard(s,activeNearby,'selectNearby',saveBtn)).join('');
  const depsHtml  = activeNearby
    ? `<div class="section-head">
        <span class="sec-title"><i class="ti ti-clock"></i>${nearbyStops.find(s=>s.id===activeNearby)?.name||activeNearby}</span>
        <button class="refresh-btn" onclick="reloadNearbyDeps()"><i class="ti ti-refresh"></i> Aktualisieren</button>
      </div><div id="nearby-deps-list"></div>`
    : '';
  document.getElementById('nearby-content').innerHTML =
    `<div class="stop-list">${stopsHtml}</div>${depsHtml}`;
  if(activeNearby) loadDeps(activeNearby, 'nearby-deps-list', false);
}

function reloadNearbyDeps(){
  if(activeNearby) loadDeps(activeNearby,'nearby-deps-list',false);
}

async function selectNearby(id, name){
  activeNearby = id;
  renderNearbyStops();
}

async function loadNearby(){
  const el = document.getElementById('nearby-content');
  el.innerHTML = '<div class="msg"><span class="spin">↻</span> Standort wird ermittelt…</div>';
  if(!navigator.geolocation){
    el.innerHTML='<div class="err">Geolocation nicht verfügbar. Bitte Suche nutzen.</div>'; return;
  }
  navigator.geolocation.getCurrentPosition(async pos=>{
    nearbyLat = pos.coords.latitude;
    nearbyLon = pos.coords.longitude;
    try {
      // Geocode mit Koordinaten: nutze reverse-geocode um nahegelegene Stops zu finden
      // MOTIS: /api/v1/reverse-geocode gibt Places zurück; Stops haben type=STOP
      const data = await apiFetch(`${API}/v1/reverse-geocode?lat=${nearbyLat}&lon=${nearbyLon}&radius=1000&limit=20`);
      // Filtere nur Stops (type=STOP oder stopId vorhanden)
      const stops = (data||[])
        .filter(p => p.type==='STOP' || p.stopId || (p.id && p.id.includes(':')))
        .map(p => ({
          id:   p.stopId || p.id,
          name: p.name,
          city: p.city || p.locality || '',
          distance: p.distance
        }))
        .filter(s=>s.id)
        .slice(0,6);

      if(!stops.length){
        // Fallback: lade stoptimes direkt auf Koordinaten mit radius
        el.innerHTML = `<div class="msg">Keine Haltestellen gefunden. Lade Abfahrten direkt…</div>
          <div class="section-head"><span class="sec-title"><i class="ti ti-clock"></i>Abfahrten in der Nähe (${nearbyLat.toFixed(4)}, ${nearbyLon.toFixed(4)})</span>
          <button class="refresh-btn" onclick="loadNearby()"><i class="ti ti-refresh"></i></button></div>
          <div id="nearby-deps-list"></div>`;
        loadDeps(`${nearbyLat},${nearbyLon}`, 'nearby-deps-list', true);
        return;
      }
      nearbyStops = stops;
      activeNearby = stops[0].id;
      renderNearbyStops();
    } catch(e){
      el.innerHTML = `<div class="err">API-Fehler: ${e.message}</div>
        <div class="msg"><span class="spin">↻</span> Lade Abfahrten direkt…</div>
        <div id="nearby-deps-list"></div>`;
      loadDeps(`${nearbyLat},${nearbyLon}`, 'nearby-deps-list', true);
    }
  }, err=>{
    const msg = err.code===1
      ? 'Standortzugriff verweigert — bitte im Browser erlauben oder Suche nutzen.'
      : 'Standort konnte nicht ermittelt werden.';
    el.innerHTML = `<div class="err"><i class="ti ti-map-pin-off"></i> ${msg}</div>`;
  }, {timeout:12000, maximumAge:60000});
}

// ── Saved ────────────────────────────────────────────────────────
function renderSaved(){
  const se = document.getElementById('saved-stops');
  const de = document.getElementById('saved-deps');
  if(!saved.length){
    se.innerHTML='<div class="empty"><i class="ti ti-bookmark" style="font-size:28px;display:block;margin:0 auto 10px"></i>Noch keine Haltestellen gespeichert.</div>';
    de.innerHTML=''; return;
  }
  se.innerHTML = saved.map(s=>stopCard(s,activeSaved,'selectSaved',delBtn)).join('');
}

async function selectSaved(id, name){
  activeSaved=id; renderSaved();
  const c = document.getElementById('saved-deps');
  c.innerHTML=`<div class="section-head"><span class="sec-title"><i class="ti ti-clock"></i>${name}</span>
    <button class="refresh-btn" onclick="selectSaved('${id.replace(/'/g,"\\'")}','${name.replace(/'/g,"\\'")}')"><i class="ti ti-refresh"></i> Aktualisieren</button></div>
    <div id="saved-dep-list"></div>`;
  await loadDeps(id,'saved-dep-list',false);
}

// ── Search ───────────────────────────────────────────────────────
async function doSearch(){
  const q = document.getElementById('search-input').value.trim();
  if(!q) return;
  document.getElementById('search-results').innerHTML='<div class="msg"><span class="spin">↻</span> Suche…</div>';
  document.getElementById('search-deps').innerHTML='';
  try {
    const data = await apiFetch(`${API}/v1/geocode?text=${encodeURIComponent(q)}&limit=10`);
    // MOTIS geocode: response ist Array von Place-Objekten
    // Stops haben type=STOP oder einen stopId
    searchResults = (data||[])
      .filter(p => p.type==='STOP' || p.stopId || (p.id&&p.id.includes(':')))
      .map(p=>({ id:p.stopId||p.id, name:p.name, city:p.city||p.locality||'' }))
      .filter(s=>s.id);
    renderSearchList();
    if(!searchResults.length){
      document.getElementById('search-results').innerHTML='<div class="msg">Keine Haltestellen gefunden. Versuche einen anderen Suchbegriff.</div>';
    }
  } catch(e){
    document.getElementById('search-results').innerHTML=`<div class="err">Suche fehlgeschlagen: ${e.message}</div>`;
  }
}

function renderSearchList(){
  const el = document.getElementById('search-results');
  if(!el) return;
  if(!searchResults.length) return;
  el.innerHTML = searchResults.map(s=>stopCard(s,activeSearch,'selectSearch',saveBtn)).join('');
}

async function selectSearch(id, name){
  activeSearch=id; renderSearchList();
  const c = document.getElementById('search-deps');
  c.innerHTML=`<div class="section-head"><span class="sec-title"><i class="ti ti-clock"></i>${name}</span>
    <button class="refresh-btn" onclick="selectSearch('${id.replace(/'/g,"\\'")}','${name.replace(/'/g,"\\'")}')"><i class="ti ti-refresh"></i> Aktualisieren</button></div>
    <div id="search-dep-list"></div>`;
  await loadDeps(id,'search-dep-list',false);
}

// ── Tab switch ───────────────────────────────────────────────────
function switchTab(t){
  tab=t;
  ['nearby','saved','search'].forEach(x=>{
    document.getElementById(`panel-${x}`).style.display=x===t?'':'none';
    document.getElementById(`tab-${x}`).classList.toggle('active',x===t);
  });
  if(t==='saved') renderSaved();
}

// ── Init ─────────────────────────────────────────────────────────
renderSaved();
loadNearby();
</script>
</body>
</html>
